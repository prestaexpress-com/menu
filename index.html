<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú Principal</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Nunito:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #e0e7f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ── BURBUJAS ── */
    .bubbles { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
    .bubble { position: absolute; bottom: -120px; border-radius: 50%; opacity: 0.18; animation: rise linear infinite; }
    .bubble:nth-child(1)  { width:60px;  height:60px;  left:8%;  background:#f39519; animation-duration:8s;  animation-delay:0s; }
    .bubble:nth-child(2)  { width:90px;  height:90px;  left:18%; background:#99b01e; animation-duration:11s; animation-delay:2s; }
    .bubble:nth-child(3)  { width:40px;  height:40px;  left:32%; background:#f39519; animation-duration:7s;  animation-delay:4s; }
    .bubble:nth-child(4)  { width:110px; height:110px; left:48%; background:#99b01e; animation-duration:13s; animation-delay:1s; }
    .bubble:nth-child(5)  { width:50px;  height:50px;  left:62%; background:#f39519; animation-duration:9s;  animation-delay:5s; }
    .bubble:nth-child(6)  { width:75px;  height:75px;  left:74%; background:#99b01e; animation-duration:10s; animation-delay:3s; }
    .bubble:nth-child(7)  { width:35px;  height:35px;  left:88%; background:#f39519; animation-duration:6s;  animation-delay:6s; }
    .bubble:nth-child(8)  { width:55px;  height:55px;  left:25%; background:#f39519; animation-duration:12s; animation-delay:0.5s;}
    .bubble:nth-child(9)  { width:80px;  height:80px;  left:55%; background:#99b01e; animation-duration:8.5s;animation-delay:7s; }
    .bubble:nth-child(10) { width:45px;  height:45px;  left:92%; background:#99b01e; animation-duration:7.5s;animation-delay:2.5s;}
    @keyframes rise {
      0%   { transform:translateY(0) scale(1);    opacity:0.18; }
      50%  { opacity:0.22; }
      100% { transform:translateY(-110vh) scale(1.1); opacity:0; }
    }

    /* ── MENÚ ── */
    #menu-screen {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #menu-screen.hidden {
      opacity: 0; transform: scale(0.92);
      pointer-events: none; position: absolute;
    }

    header { text-align: center; margin-bottom: 56px; animation: fadeDown 0.8s cubic-bezier(.22,1,.36,1) both; }
    header h1 { font-family:'Outfit',sans-serif; font-weight:900; font-size:clamp(1.5rem,3vw,2.2rem); color:#2a3560; letter-spacing:-0.5px; }
    header p  { margin-top:8px; font-size:0.95rem; color:#5a6a9a; font-weight:600; letter-spacing:0.5px; }

    .cards { display:flex; gap:40px; flex-wrap:wrap; justify-content:center; padding:0 24px; }

    .card {
      width:260px; height:260px; border-radius:28px;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
      text-decoration:none; cursor:pointer; position:relative; overflow:hidden; border:none;
      box-shadow:0 8px 32px rgba(80,100,180,0.13), 0 2px 8px rgba(0,0,0,0.07);
      transition:transform 0.32s cubic-bezier(.22,1,.36,1), box-shadow 0.32s ease;
      animation:popIn 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    .card:nth-child(1) { animation-delay:0.25s; }
    .card:nth-child(2) { animation-delay:0.45s; }

    .card::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.45) 0%,transparent 60%);
      border-radius:inherit; opacity:0.7;
    }
    .card::after {
      content:''; position:absolute; top:-60%; left:-60%; width:60%; height:200%;
      background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.5) 50%,transparent 70%);
      transform:skewX(-20deg); transition:left 0.55s ease; pointer-events:none;
    }
    .card:hover::after { left:130%; }
    .card:hover { transform:translateY(-10px) scale(1.04); box-shadow:0 24px 56px rgba(80,100,180,0.22),0 4px 16px rgba(0,0,0,0.10); }

    .card-orange { background-color:#f39519; }
    .card-green  { background-color:#99b01e; }

    .card-icon {
      width:64px; height:64px; border-radius:16px; background:rgba(0,0,0,0.1);
      display:flex; align-items:center; justify-content:center;
      position:relative; z-index:1; transition:transform 0.3s cubic-bezier(.22,1,.36,1);
    }
    .card:hover .card-icon { transform:scale(1.15) rotate(-5deg); }
    .card-icon svg { width:34px; height:34px; fill:rgba(0,0,0,0.55); }

    .card-label {
      font-family:'Outfit',sans-serif; font-weight:900; font-size:1.08rem; color:#111;
      text-align:center; line-height:1.3; padding:0 18px; position:relative; z-index:1;
    }
    .card-arrow {
      position:absolute; bottom:18px; right:20px; width:32px; height:32px;
      background:rgba(0,0,0,0.12); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.25s,transform 0.3s; z-index:1;
    }
    .card:hover .card-arrow { background:rgba(0,0,0,0.22); transform:translate(3px,-3px); }
    .card-arrow svg { width:16px; height:16px; fill:none; stroke:rgba(0,0,0,0.6); stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

    @keyframes pulse-ring       { 0%{box-shadow:0 0 0 0 rgba(243,149,25,0.35)} 70%{box-shadow:0 0 0 18px rgba(243,149,25,0)} 100%{box-shadow:0 0 0 0 rgba(243,149,25,0)} }
    @keyframes pulse-ring-green { 0%{box-shadow:0 0 0 0 rgba(153,176,30,0.35)} 70%{box-shadow:0 0 0 18px rgba(153,176,30,0)} 100%{box-shadow:0 0 0 0 rgba(153,176,30,0)} }
    .card-orange:hover { animation:pulse-ring 1s ease-out; }
    .card-green:hover  { animation:pulse-ring-green 1s ease-out; }

    @keyframes popIn    { 0%{opacity:0;transform:scale(0.7) translateY(40px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes fadeDown { 0%{opacity:0;transform:translateY(-30px)}            100%{opacity:1;transform:translateY(0)} }

    /* ── VISTA DASHBOARD ── */
    #dashboard-screen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #dashboard-screen.visible { opacity: 1; pointer-events: all; }

    /* Barra superior */
    #dash-topbar {
      height: 54px; min-height: 54px;
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      background: #2a3560;
      box-shadow: 0 2px 16px rgba(0,0,0,0.22);
      z-index: 11;
    }

    #btn-back {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.13);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 0.88rem;
      padding: 7px 16px 7px 10px;
      border-radius: 50px; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    #btn-back:hover { background: rgba(255,255,255,0.24); transform: translateX(-3px); }
    #btn-back svg   { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

    #dash-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900; font-size: 0.95rem;
      color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    #dash-badge {
      margin-left: auto;
      width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
    }

    /* Iframe */
    #dash-frame { flex: 1; border: none; width: 100%; display: block; background: #fff; }

    /* Loading */
    #dash-loading {
      position: absolute; inset: 54px 0 0 0;
      background: #e0e7f8;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 12; transition: opacity 0.3s;
    }
    #dash-loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 46px; height: 46px; border-radius: 50%;
      border: 4px solid rgba(42,53,96,0.15);
      border-top-color: #2a3560;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #dash-loading p { font-family:'Nunito',sans-serif; font-weight:700; color:#2a3560; font-size:0.92rem; }
  </style>
</head>
<body>

  <!-- Burbujas -->
  <div class="bubbles">
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
  </div>

  <!-- ══ MENÚ ══ -->
  <div id="menu-screen">
    <header>
      <h1>Menú</h1>
      <p>Seleccione el dashboard que desea visualizar</p>
    </header>

    <div class="cards">
      <button class="card card-orange"
        onclick="openDash('https://prestaexpress-com.github.io/Dashboard-Cartera-Hollem-S.A./',' ','#f39519')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><path d="M2 13h20"/></svg>
        </div>
        <span class="card-label">Dashboard Cartera<br>Hollem, S.A.</span>
        <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </button>

      <button class="card card-green"
        onclick="openDash('https://prestaexpress-com.github.io/DASHBOARD-CARTERA-COOPEXPRESS-S.A./',' ','#99b01e')">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <span class="card-label">Dashboard de<br>Cartera en Mora</span>
        <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </button>
    </div>
  </div>

  <!-- ══ VISTA DASHBOARD ══ -->
  <div id="dashboard-screen">
    <div id="dash-topbar">
      <button id="btn-back" onclick="goBack()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        ← Menú Principal
      </button>
      <span id="dash-title"></span>
      <span id="dash-badge"></span>
    </div>

    <div id="dash-loading">
      <div class="spinner"></div>
      <p>Cargando dashboard…</p>
    </div>

    <iframe id="dash-frame" src="" title="Dashboard" onload="frameLoaded()"></iframe>
  </div>

  <script>
    const menuScreen  = document.getElementById('menu-screen');
    const dashScreen  = document.getElementById('dashboard-screen');
    const dashFrame   = document.getElementById('dash-frame');
    const dashTitle   = document.getElementById('dash-title');
    const dashBadge   = document.getElementById('dash-badge');
    const dashLoading = document.getElementById('dash-loading');

    function openDash(url, title, color) {
      menuScreen.classList.add('hidden');
      dashTitle.textContent = title;
      dashBadge.style.background = color;
      dashLoading.classList.remove('hidden');
      dashFrame.src = url;
      dashScreen.classList.add('visible');
    }

    function frameLoaded() {
      dashLoading.classList.add('hidden');
    }

    function goBack() {
      dashScreen.classList.remove('visible');
      setTimeout(() => { dashFrame.src = ''; }, 400);
      menuScreen.classList.remove('hidden');
    }
  </script>
</body>
</html>
